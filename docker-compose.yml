services:
  nginx:
    image: nginx:alpine
    container_name: ${APP_NAME}-nginx
    ports:
      - "${APP_PORT}:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - default

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - UID=${UID:-1000}
        - GID=${GID:-1000}
    container_name: ${APP_NAME}-app
    volumes:
      - ./src:/var/www/html
    environment:
      - APP_ENV=local
      - DB_HOST=db
      - DB_NAME=${DB_DATABASE}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASSWORD}
      - APP_TIMEZONE=${APP_TIMEZONE:-UTC}
      - TZ=${APP_TIMEZONE:-UTC}
      - DB_REDIS_HOST=redis
    networks:
      - default

  redis:
    image: redis:7-alpine
    container_name: ${APP_NAME}-redis
    restart: unless-stopped
    networks:
      - default

  db:
    image: mysql:8.0
    container_name: ${APP_NAME}-db
    restart: always
    ports:
      - "${DB_PORT}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      TZ: ${APP_TIMEZONE:-UTC}
    volumes:
      - db_data:/var/lib/mysql
      - ./mysql.cnf:/etc/mysql/conf.d/custom.cnf
    networks:
      - default

  pma:
    image: phpmyadmin/phpmyadmin
    container_name: ${APP_NAME}-pma
    ports:
      - "${PMA_PORT}:80"
    environment:
      PMA_HOST: db
      PMA_USER: ${DB_USER}
      PMA_PASSWORD: ${DB_PASSWORD}
    networks:
      - default

networks:
  default:
    name: ${APP_NAME}-net

volumes:
  db_data:
