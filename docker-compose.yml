services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - UID=${UID:-1000}
        - GID=${GID:-1000}
    container_name: php-monolith-app
    ports:
      - "1234:80"
    volumes:
      - ./src:/var/www/html
    environment:
      - APP_ENV=local
      - DB_HOST=db
      - DB_NAME=${APP_NAME:-myapp}
      - DB_USER=${DB_USER:-user}
      - DB_PASS=${DB_PASSWORD:-password}
    networks:
      - default
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.${APP_NAME:-myapp}.rule=Host(`${DOMAIN:-myapp.localhost}`)"
    #   - "traefik.http.routers.${APP_NAME:-myapp}.entrypoints=web"
    #   - "traefik.http.services.${APP_NAME:-myapp}.loadbalancer.server.port=80"

  db:
    image: mysql:8.0
    container_name: php-monolith-db
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${APP_NAME:-myapp}
      MYSQL_USER: ${DB_USER:-user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - default

  pma:
    image: phpmyadmin/phpmyadmin
    container_name: php-monolith-pma
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: ${DB_USER:-user}
      PMA_PASSWORD: ${DB_PASSWORD:-password}
    networks:
      - default
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.${APP_NAME:-myapp}-pma.rule=Host(`pma.${DOMAIN:-myapp.localhost}`)"
    #   - "traefik.http.routers.${APP_NAME:-myapp}-pma.entrypoints=web"
    #   - "traefik.http.services.${APP_NAME:-myapp}-pma.loadbalancer.server.port=80"

networks:
  default:
    name: php-monolith-net

volumes:
  db_data:
