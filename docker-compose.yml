services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - UID=${UID:-1000}
        - GID=${GID:-1000}
    container_name: ${APP_NAME}-app
    ports:
      - "${APP_PORT}:80"
    volumes:
      - ./src:/var/www/html
    environment:
      - APP_ENV=local
      - DB_HOST=db
      - DB_NAME=${DB_DATABASE}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASSWORD}
    networks:
      - default

  db:
    image: mysql:8.0
    container_name: ${APP_NAME}-db
    restart: always
    ports:
      - "${DB_PORT}:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - default

  pma:
    image: phpmyadmin/phpmyadmin
    container_name: ${APP_NAME}-pma
    ports:
      - "${PMA_PORT}:80"
    environment:
      PMA_HOST: db
      PMA_USER: ${DB_USER}
      PMA_PASSWORD: ${DB_PASSWORD}
    networks:
      - default

networks:
  default:
    name: ${APP_NAME}-net

volumes:
  db_data: